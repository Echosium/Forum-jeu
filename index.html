<script>
document.addEventListener("DOMContentLoaded", () => {

  const supabaseUrl = "https://hcjloonjiezzervfbiqr.supabase.co";
  const supabaseKey = "TA_CLE_ANON";

  const client = window.supabase.createClient(supabaseUrl, supabaseKey);

  window.addPlayer = async function(pseudo) {
    const { data, error } = await client
      .from("players")
      .insert([{ pseudo, last_seen: new Date() }]);

    console.log(data, error);
  };

  window.getPlayers = async function() {
    const { data, error } = await client
      .from("players")
      .select("*");

    console.log(data, error);
  };

});
</script>
